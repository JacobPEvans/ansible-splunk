---
name: CI Fix (Claude)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    uses: JacobPEvans/ai-workflows/.github/workflows/ci-fix.yml@v0.8.0
    with:
      repo_context: "Ansible playbooks and roles for Splunk Enterprise deployment and configuration"
      ci_structure: "ci.yml (lint and validation checks) + molecule.yml (Molecule integration tests)"
    secrets: inherit
