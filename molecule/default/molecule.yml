---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/requirements.yml

driver:
  name: docker

platforms:
  - name: splunk-test
    image: geerlingguy/docker-debian12-ansible:latest
    privileged: true
    command: ""
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    groups:
      - splunk
    docker_networks:
      - name: splunk_network

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/roles
  inventory:
    group_vars:
      all:
        # Test values for molecule - override in production
        splunk_docker_password: "molecule-test-password"
        # Empty the add-on registry so molecule never tries to reach MinIO
        # or GitHub at converge time. apps.yml loops over splunk_docker_addons;
        # an empty list is a no-op.
        splunk_docker_addons: []
        # 127.0.0.1:8000 is unreachable from inside the Molecule container
        # (Docker socket mounts expose ports on the HOST, not inside the test container).
        # Skip the wait entirely in CI rather than burning 360s per invocation.
        splunk_docker_wait_enabled: false
  env:
    SPLUNK_DOCKER_PASSWORD: "molecule-test-password"

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
